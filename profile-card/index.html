<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(375deg, #1cc7d0, #2ede98);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background-color: white;
        width: 350px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }
      .profile img {
        width: 130px;
        height: 130px;
        object-fit: cover;
        background: linear-gradient(375deg, #1cc7d0, #2ede98);
        padding: 5px;
        border-radius: 50%;
      }
      .name {
        font-size: 25px;
        font-weight: 500;
        margin-top: 10px;
      }
      .desc {
        width: 180px;
        text-align: center;
        margin-top: 10px;
      }
      .social {
        display: flex;
        flex-direction: row;
        gap: 10px;
      }
      .social a {
        background: linear-gradient(375deg, #1cc7d0, #2ede98);
        color: white;
        border-radius: 50%;
        padding: 7px;
        margin-top: 10px;
      }
      .social a:hover {
        transform: scale(1.15);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="profile">
        <img
          src="images/ai-generated-cute-girl-pic_23-2150649842.avif"
          alt="Image"
        />
      </div>
      <div class="name">Ankitha</div>
      <div class="desc">User interface designer and front-end developer.</div>
      <div class="social">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
      </div>
    </div>
  </body>
</html>
