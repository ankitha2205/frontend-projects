<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Card</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="root">
      <div class="left">
        <span><i>share</i></span>
        <span><i>favorite_border</i></span>
        <div class="img">
          <img src="images/green-apple-with-slice.png" alt="" />
        </div>
      </div>
      <div class="right">
        <div class="header">
          <span class="heading">Delicious Apples</span>
          <span class="code">COD 45599 </span>
        </div>
        <div class="price">
          <span class="rs">RS</span>
          <span class="price1">7.93</span>
        </div>
        <div class="color">
          <span>SELECT A COLOR</span>
          <div class="colors">
            <div class="fruit"><span>&#8226;</span></div>
            <div class="fruit">
              <img src="images/green-apple2.png" alt="" />
            </div>
            <div class="fruit">
              <img src="images/yellow-apple.png" alt="" />
            </div>
            <div class="fruit"><img src="images/red-apple.png" alt="" /></div>
            <div class="fruit">
              <img src="images/orange-apple.png" alt="" />
            </div>
          </div>
        </div>
        <div class="benefits">
          <span>Benefits</span>
          <ul>
            <li>Apples are nutricious</li>
            <li>Apples may be good for weight loss</li>
            <li>Apples may be good for bone health</li>
            <li>They are linkked to a lowest nsk for diabetes</li>
          </ul>
        </div>
        <div class="footer">
          <button>ADD TO CART</button>
        </div>
      </div>
    </div>
  </body>
</html>
